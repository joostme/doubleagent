<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-label="Flow diagram: ai-agent to doubleagent to internet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7f0"/>
      <stop offset="100%" stop-color="#f3f7ff"/>
    </linearGradient>

    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8ff"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <marker id="arrow" viewBox="0 0 12 12" refX="10.5" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f97316"/>
    </marker>

    <style>
      .card { fill:url(#cardFill); stroke:#e5e7eb; stroke-width:1.2; }
      .accent { fill:none; stroke:#f97316; stroke-width:2.2; opacity:0.9; }
      .label { font: 800 16px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill:#0f172a; }
      .small { font: 650 12.5px/1.2 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill:#475569; }
      .edge { fill:none; stroke:#94a3b8; stroke-width:3; }
      .edgeAccent { fill:none; stroke:#f97316; stroke-width:3.2; opacity:0.95; }
      .dot { fill:#fff1e6; stroke:#fb923c; stroke-width:2; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="320" fill="url(#bg)"/>
  <circle cx="105" cy="70" r="45" fill="#f97316" opacity="0.10"/>
  <circle cx="720" cy="70" r="55" fill="#fb923c" opacity="0.08"/>
  <circle cx="670" cy="285" r="75" fill="#60a5fa" opacity="0.06"/>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect class="card" x="290" y="20" width="240" height="70" rx="16" ry="16"/>
    <rect class="accent" x="290" y="20" width="240" height="70" rx="16" ry="16"/>
    <circle class="dot" cx="320" cy="55" r="12.5"/>
    <path d="M 316 55 H 324" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
    <path d="M 320 51 V 59" stroke="#9a3412" stroke-width="2" stroke-linecap="round"/>
    <text x="410" y="46" text-anchor="middle" class="label">ai-agent</text>
    <text x="410" y="66" text-anchor="middle" class="small">internal only net</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="290" y="135" width="240" height="70" rx="16" ry="16"/>
    <rect class="accent" x="290" y="135" width="240" height="70" rx="16" ry="16" opacity="0.75"/>
    <circle class="dot" cx="320" cy="170" r="12.5"/>
    <path d="M 314 170 C 318 160, 322 160, 326 170" stroke="#9a3412" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="318" cy="170" r="2" fill="#9a3412"/>
    <circle cx="322" cy="170" r="2" fill="#9a3412"/>
    <text x="410" y="161" text-anchor="middle" class="label">doubleagent</text>
    <text x="410" y="181" text-anchor="middle" class="small">rules + secrets</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="card" x="290" y="250" width="240" height="50" rx="16" ry="16"/>
    <rect class="accent" x="290" y="250" width="240" height="50" rx="16" ry="16" opacity="0.7"/>

    <!-- Proper "internet" icon: globe -->
    <g>
      <!-- globe outer -->
      <circle cx="320" cy="275" r="10" fill="#fff1e6" stroke="#fb923c" stroke-width="1.6"/>
      <!-- longitude lines -->
      <path d="M 320 265 C 315 270, 315 280, 320 285 C 325 280, 325 270, 320 265 Z" fill="none" stroke="#9a3412" stroke-width="1.6"/>
      <path d="M 330 272 C 327 267, 313 267, 310 272" fill="none" stroke="#9a3412" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M 330 278 C 327 283, 313 283, 310 278" fill="none" stroke="#9a3412" stroke-width="1.6" stroke-linecap="round"/>
      <!-- latitude/equator -->
      <path d="M 310 275 H 330" fill="none" stroke="#9a3412" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <text x="410" y="282" text-anchor="middle" class="label" style="font-size:16px;">internet</text>
  </g>

  <!-- Edges -->
  <path class="edge" d="M 410 90 C 410 110, 410 115, 410 135"/>
  <path class="edgeAccent" d="M 410 90 C 410 110, 410 115, 410 135" marker-end="url(#arrow)"/>

  <path class="edge" d="M 410 205 C 410 225, 410 230, 410 250"/>
  <path class="edgeAccent" d="M 410 205 C 410 225, 410 230, 410 250" marker-end="url(#arrow)"/>
</svg>