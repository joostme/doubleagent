# doubleagent - AI safety proxy sidecar
#
# This example uses explicit proxy mode.
# The AI container talks to `http://doubleagent:8080` via HTTP_PROXY / HTTPS_PROXY.
# doubleagent swaps placeholder secrets for real ones and blocks forbidden calls.

services:
  doubleagent:
    build: .
    volumes:
      - certs:/certs
      - ./config.json:/config/config.json:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9000/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  ai-agent:
    image: my-ai-agent:latest
    depends_on:
      doubleagent:
        condition: service_healthy
    volumes:
      - certs:/certs:ro
    environment:
      - OPENAI_API_KEY=PLACEHOLDER_OPENAI_KEY
      - ANTHROPIC_API_KEY=PLACEHOLDER_ANTHROPIC_KEY
      - GITHUB_TOKEN=PLACEHOLDER_GITHUB_TOKEN
      - HTTP_PROXY=http://doubleagent:8080
      - HTTPS_PROXY=http://doubleagent:8080
      - NO_PROXY=localhost,127.0.0.1
      - NODE_EXTRA_CA_CERTS=/certs/ca.crt
      - REQUESTS_CA_BUNDLE=/certs/ca.crt
      - SSL_CERT_FILE=/certs/ca.crt
      - CURL_CA_BUNDLE=/certs/ca.crt
      - GIT_SSL_CAINFO=/certs/ca.crt

volumes:
  certs:
